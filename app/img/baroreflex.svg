<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" style="background: #ffffff;">
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e293b">Arco Reflexo Barorreceptor</text>
  
  <!-- Heart -->
  <g id="heart">
    <path d="M 150 350 C 150 350 90 290 90 230 C 90 170 140 170 150 220 C 160 170 210 170 210 230 C 210 290 150 350 150 350 Z" 
          fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="150" y="270" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Coração</text>
    
    <!-- Heart rate indicator -->
    <text x="150" y="380" font-family="Arial" font-size="12" text-anchor="middle" fill="#dc2626">FC ↑ ou ↓</text>
  </g>
  
  <!-- Aortic arch with baroreceptors -->
  <g id="aorta">
    <path d="M 150 210 Q 150 150 200 120 Q 250 90 300 90" 
          stroke="#dc2626" stroke-width="20" fill="none" stroke-linecap="round"/>
    
    <!-- Baroreceptor location -->
    <circle cx="220" cy="130" r="18" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
    <text x="220" y="135" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#78350f">Baro</text>
    
    <text x="220" y="170" font-family="Arial" font-size="13" font-weight="bold" fill="#ea580c">Seio Aórtico</text>
  </g>
  
  <!-- Carotid artery with baroreceptors -->
  <g id="carotid">
    <path d="M 300 90 L 380 90 Q 400 90 410 110 L 420 180" 
          stroke="#dc2626" stroke-width="16" fill="none" stroke-linecap="round"/>
    
    <!-- Baroreceptor location -->
    <circle cx="405" cy="120" r="18" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
    <text x="405" y="125" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#78350f">Baro</text>
    
    <text x="460" y="140" font-family="Arial" font-size="13" font-weight="bold" fill="#ea580c">Seio Carotídeo</text>
  </g>
  
  <!-- Brainstem / Medulla -->
  <g id="medulla">
    <ellipse cx="480" cy="280" rx="80" ry="90" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="480" y="265" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#92400e">Centro</text>
    <text x="480" y="282" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#92400e">Vasomotor</text>
    <text x="480" y="300" font-family="Arial" font-size="11" text-anchor="middle" fill="#78350f">(Bulbo/Medula)</text>
  </g>
  
  <!-- Neural pathways -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#dc2626"/>
    </marker>
  </defs>
  
  <!-- Afferent pathway (IX/X nerves) -->
  <path d="M 235 140 Q 350 180 420 250" 
        stroke="#0ea5e9" stroke-width="3" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>
  <text x="320" y="170" font-family="Arial" font-size="11" fill="#0369a1" font-weight="bold">N. Glossofaríngeo (IX)</text>
  <text x="320" y="184" font-family="Arial" font-size="11" fill="#0369a1" font-weight="bold">N. Vago (X)</text>
  <text x="320" y="198" font-family="Arial" font-size="10" fill="#0284c7">(Vias Aferentes)</text>
  
  <!-- Efferent - Parasympathetic -->
  <path d="M 430 320 Q 300 370 200 320" 
        stroke="#16a34a" stroke-width="3" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>
  <text x="310" y="395" font-family="Arial" font-size="11" fill="#15803d" font-weight="bold">Parassimpático ↑</text>
  <text x="310" y="408" font-family="Arial" font-size="10" fill="#166534">(↓ FC quando PA alta)</text>
  
  <!-- Efferent - Sympathetic -->
  <path d="M 430 240 Q 300 200 200 250" 
        stroke="#dc2626" stroke-width="3" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <text x="300" y="220" font-family="Arial" font-size="11" fill="#991b1b" font-weight="bold">Simpático ↓</text>
  <text x="300" y="233" font-family="Arial" font-size="10" fill="#7f1d1d">(Inibido quando PA alta)</text>
  
  <!-- Explanation box -->
  <rect x="20" y="430" width="560" height="60" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" rx="6"/>
  <text x="300" y="450" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Mecanismo de Feedback Negativo:</text>
  <text x="300" y="467" font-family="Arial" font-size="11" text-anchor="middle" fill="#075985">↑ PA → Barorreceptores detectam → ↑ Atividade parassimpática + ↓ Simpática → ↓ FC e Vasodilatação → ↓ PA</text>
  <text x="300" y="482" font-family="Arial" font-size="11" text-anchor="middle" fill="#075985">↓ PA → Barorreceptores "silenciam" → ↓ Parassimpático + ↑ Simpático → ↑ FC e Vasoconstrição → ↑ PA</text>
</svg>
