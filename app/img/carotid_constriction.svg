<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" style="background: #ffffff;">
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e293b">Experimento: Constrição da Artéria Carótida</text>
  
  <!-- Artery segments -->
  <!-- Before constriction -->
  <g id="proximal">
    <rect x="30" y="140" width="200" height="60" rx="30" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="130" y="110" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Carótida Proximal</text>
    
    <!-- Pressure indicator -->
    <text x="130" y="175" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#dc2626">PA = ALTA</text>
    <text x="130" y="195" font-family="Arial" font-size="12" text-anchor="middle" fill="#991b1b">(100 mmHg)</text>
  </g>
  
  <!-- Constriction point -->
  <g id="constriction">
    <path d="M 230 150 Q 270 170 310 150" 
          stroke="#374151" stroke-width="40" fill="none" stroke-linecap="round"/>
    
    <!-- Ligature/knot representation -->
    <line x1="250" y1="120" x2="290" y2="210" stroke="#1f2937" stroke-width="5"/>
    <line x1="290" y1="120" x2="250" y2="210" stroke="#1f2937" stroke-width="5"/>
    <circle cx="270" cy="165" r="8" fill="#374151" stroke="#1f2937" stroke-width="2"/>
    
    <text x="270" y="240" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1f2937">NÓ / LIGADURA</text>
    <text x="270" y="256" font-family="Arial" font-size="11" text-anchor="middle" fill="#4b5563">(Constrição artificial)</text>
  </g>
  
  <!-- After constriction (distal segment with baroreceptor) -->
  <g id="distal">
    <rect x="310" y="140" width="260" height="60" rx="30" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="440" y="110" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Carótida Distal</text>
    
    <!-- Baroreceptor -->
    <circle cx="400" cy="170" r="22" fill="#fde047" stroke="#eab308" stroke-width="3"/>
    <text x="400" y="175" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#713f12">BARO</text>
    
    <!-- Pressure indicator -->
    <text x="500" y="175" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#2563eb">PA = BAIXA</text>
    <text x="500" y="195" font-family="Arial" font-size="12" text-anchor="middle" fill="#1e40af">(30 mmHg)</text>
  </g>
  
  <!-- Explanation boxes -->
  <rect x="30" y="290" width="260" height="130" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="160" y="310" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400e">O que o Barorreceptor "Sente"?</text>
  <text x="160" y="330" font-family="Arial" font-size="11" text-anchor="middle" fill="#78350f">Ele está DEPOIS do nó, então detecta</text>
  <text x="160" y="346" font-family="Arial" font-size="11" text-anchor="middle" fill="#78350f">uma pressão BAIXA (mesmo que a PA</text>
  <text x="160" y="362" font-family="Arial" font-size="11" text-anchor="middle" fill="#78350f">sistêmica real esteja normal/alta)</text>
  <text x="160" y="385" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#b45309">→ Interpreta como HIPOTENSÃO</text>
  <text x="160" y="405" font-family="Arial" font-size="11" text-anchor="middle" fill="#92400e">(falsa percepção)</text>
  
  <rect x="310" y="290" width="260" height="130" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
  <text x="440" y="310" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Resposta do Corpo:</text>
  <text x="440" y="332" font-family="Arial" font-size="12" text-anchor="middle" fill="#991b1b">✓ ATIVAÇÃO SIMPÁTICA MACIÇA ↑↑</text>
  <text x="440" y="350" font-family="Arial" font-size="11" text-anchor="middle" fill="#7f1d1d">• Taquicardia (↑ FC)</text>
  <text x="440" y="366" font-family="Arial" font-size="11" text-anchor="middle" fill="#7f1d1d">• Vasoconstrição generalizada (↑ RPT)</text>
  <text x="440" y="382" font-family="Arial" font-size="11" text-anchor="middle" fill="#7f1d1d">• Redução fluxo renal</text>
  <text x="440" y="405" font-family="Arial" font-size="10" font-style="italic" text-anchor="middle" fill="#991b1b">Tentativa de "corrigir" a hipotensão fictícia</text>
</svg>
