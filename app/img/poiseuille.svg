<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" style="background: #ffffff;">
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e293b">Lei de Poiseuille: Fluxo Sanguíneo</text>
  
  <!-- Vessel A (smallest) -->
  <g id="vesselA">
    <ellipse cx="120" cy="140" rx="25" ry="25" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <ellipse cx="120" cy="140" rx="15" ry="15" fill="#bae6fd" stroke="#0369a1" stroke-width="2"/>
    
    <text x="120" y="190" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Vaso A</text>
    <text x="120" y="206" font-family="Arial" font-size="12" text-anchor="middle" fill="#0369a1">r = 1</text>
    <text x="120" y="222" font-family="Arial" font-size="11" text-anchor="middle" fill="#075985">ΔP = 100</text>
    
    <rect x="85" y="235" width="70" height="30" fill="#f0f9ff" stroke="#0284c7" stroke-width="1" rx="4"/>
    <text x="120" y="253" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Fluxo = 100</text>
  </g>
  
  <!-- Vessel B -->
  <g id="vesselB">
    <ellipse cx="260" cy="140" rx="40" ry="40" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <ellipse cx="260" cy="140" rx="28" ry="28" fill="#bae6fd" stroke="#0369a1" stroke-width="2"/>
    
    <text x="260" y="200" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Vaso B</text>
    <text x="260" y="216" font-family="Arial" font-size="12" text-anchor="middle" fill="#0369a1">r = 2</text>
    <text x="260" y="232" font-family="Arial" font-size="11" text-anchor="middle" fill="#075985">ΔP = 50</text>
    
    <rect x="220" y="245" width="80" height="30" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="260" y="263" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Fluxo = 800</text>
  </g>
  
  <!-- Vessel C -->
  <g id="vesselC">
    <ellipse cx="410" cy="145" rx="65" ry="65" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <ellipse cx="410" cy="145" rx="50" ry="50" fill="#bae6fd" stroke="#0369a1" stroke-width="2"/>
    
    <text x="410" y="230" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Vaso C</text>
    <text x="410" y="246" font-family="Arial" font-size="12" text-anchor="middle" fill="#0369a1">r = 4</text>
    <text x="410" y="262" font-family="Arial" font-size="11" text-anchor="middle" fill="#075985">ΔP = 25</text>
    
    <rect x="360" y="275" width="100" height="32" fill="#0ea5e9" stroke="#0284c7" stroke-width="2" rx="4"/>
    <text x="410" y="295" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Fluxo = 6400</text>
  </g>
  
  <!-- Vessel D (largest) -->
  <g id="vesselD">
    <ellipse cx="120" cy="390" rx="90" ry="90" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
    <ellipse cx="120" cy="390" rx="72" ry="72" fill="#bae6fd" stroke="#0369a1" stroke-width="3"/>
    
    <text x="120" y="315" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Vaso D (MAIOR FLUXO!)</text>
    <text x="120" y="385" font-family="Arial" font-size="13" text-anchor="middle" fill="#0369a1">r = 6</text>
    <text x="120" y="405" font-family="Arial" font-size="12" text-anchor="middle" fill="#075985">ΔP = 10</text>
    
    <rect x="240" y="365" width="130" height="40" fill="#0369a1" stroke="#0284c7" stroke-width="3" rx="6"/>
    <text x="305" y="390" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle" fill="#ffffff">Fluxo = 12,960</text>
  </g>
  
  <!-- Formula and explanation -->
  <rect x="240" y="320" width="340" height="145" fill="#f8fafc" stroke="#64748b" stroke-width="2" rx="6"/>
  <text x="410" y="345" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle" fill="#0f172a">Lei de Poiseuille:</text>
  
  <text x="410" y="372" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Q = (ΔP × π × r⁴) / (8 × η × L)</text>
  
  <text x="410" y="395" font-family="Arial" font-size="12" text-anchor="middle" fill="#475569">Simplificando: Fluxo ∝ ΔP × r⁴</text>
  
  <rect x="250" y="405" width="320" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="410" y="423" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">⚡ O raio tem impacto à 4ª potência!</text>
  <text x="410" y="438" font-family="Arial" font-size="11" text-anchor="middle" fill="#78350f">Dobrar o raio = 16× mais fluxo</text>
  <text x="410" y="451" font-family="Arial" font-size="11" text-anchor="middle" fill="#78350f">Reduzir raio pela metade = 1/16 do fluxo</text>
</svg>
