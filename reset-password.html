<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Senha - MedPenguim</title>
    <meta name="description" content="Atualize sua senha na plataforma MedPenguim.">
    <link rel="icon" type="image/png" href="app/img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-input: rgba(15, 23, 42, 0.6);
            --border-color: rgba(99, 102, 241, 0.2);
            --border-focus: rgba(99, 102, 241, 0.6);
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --text-white: #f1f5f9;
            --text-muted: #94a3b8;
            --text-subtle: #64748b;
            --error-bg: rgba(239, 68, 68, 0.15);
            --error-text: #f87171;
            --success-bg: rgba(34, 197, 94, 0.15);
            --success-text: #4ade80;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-white);
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-brand h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f1f5f9, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 10px;
            font-style: italic;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .error-message, .success-message {
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .success-message {
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 20px;
        }

        .interactive-penguin {
            overflow: visible;
            margin-bottom: 24px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        .password-input-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            padding: 4px;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <svg viewBox="0 0 100 100" class="interactive-penguin" width="90" height="90">
                <path d="M 15 45 C 15 5, 85 5, 85 45 C 85 85, 75 95, 50 95 C 25 95, 15 85, 15 45" fill="#1e293b"/>
                <path d="M 25 50 C 25 25, 75 25, 75 50 C 75 87, 65 92, 50 92 C 35 92, 25 87, 25 50" fill="#f1f5f9"/>
                <path d="M 30 46 C 10 50, 14 85, 23 94 C 30 85, 30 65, 45 58 Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
                <path d="M 70 46 C 90 50, 86 85, 77 94 C 70 85, 70 65, 55 58 Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
                <path d="M 46 48 L 54 48 L 50 54 Z" fill="#f59e0b"/>
                <g class="eyes">
                    <ellipse cx="38" cy="42" rx="4" ry="6" fill="#0f172a"/>
                    <ellipse cx="62" cy="42" rx="4" ry="6" fill="#0f172a"/>
                </g>
            </svg>
            <h1>Nova Senha</h1>
            <p>Defina sua nova credencial de acesso</p>
        </div>

        <div class="login-card" style="position: relative;">
            <div id="loading-view" class="loading-overlay">
                <p>Verificando link...</p>
            </div>

            <div id="error-box" class="error-message"></div>
            <div id="success-box" class="success-message"></div>

            <form id="reset-form" style="display: none;">
                <div class="form-group">
                    <label for="password">Nova Senha</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" required placeholder="Pelo menos 6 caracteres" minlength="6">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">Atualizar Senha</button>
            </form>

            <div id="return-link" style="text-align: center; margin-top: 24px; display: none;">
                <a href="login.html" style="color: var(--primary-hover); text-decoration: none; font-size: 0.9rem; font-weight: 600;">Voltar para o Login</a>
            </div>
        </div>
    </div>

    <!-- Config + Supabase CDN -->
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(MEDPENGUIM_CONFIG.supabaseUrl, MEDPENGUIM_CONFIG.supabaseKey);

        document.addEventListener('DOMContentLoaded', async () => {
            const loadingView = document.getElementById('loading-view');
            const resetForm = document.getElementById('reset-form');
            const errorBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');
            const returnLink = document.getElementById('return-link');

            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            async function verifyFlow() {
                try {
                    if (code) {
                        // PKCE: Exchange code for session
                        const { error } = await supabase.auth.exchangeCodeForSession(code);
                        if (error) throw new Error('Link inválido ou expirado.');
                        
                        // Clean URL
                        window.history.replaceState({}, "", window.location.pathname);
                    } else {
                        // Check if already has a session (recovery session)
                        const { data: { session } } = await supabase.auth.getSession();
                        if (!session) throw new Error('Sessão não encontrada. Use o link enviado por e-mail.');
                    }

                    // Success: Show form
                    loadingView.style.display = 'none';
                    resetForm.style.display = 'block';
                } catch (err) {
                    loadingView.style.display = 'none';
                    errorBox.textContent = err.message;
                    errorBox.style.display = 'block';
                    returnLink.style.display = 'block';
                }
            }

            verifyFlow();

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                const submitBtn = document.getElementById('submit-btn');

                submitBtn.textContent = 'Atualizando...';
                submitBtn.disabled = true;

                try {
                    const { error } = await supabase.auth.updateUser({ password });
                    if (error) throw error;

                    successBox.textContent = 'Senha atualizada com sucesso! Você já pode entrar.';
                    successBox.style.display = 'block';
                    errorBox.style.display = 'none';
                    resetForm.style.display = 'none';
                    returnLink.style.display = 'block';
                } catch (err) {
                    console.error('[RESET] Error:', err);
                    errorBox.textContent = err.message || 'Erro ao atualizar senha.';
                    errorBox.style.display = 'block';
                    submitBtn.textContent = 'Atualizar Senha';
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
